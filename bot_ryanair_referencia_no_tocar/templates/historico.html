<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>📊 {{ t("history_title") }} · Ryanair Bot</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

  <!-- Chart.js + plugin de zoom -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2"></script>

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/main.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/main.min.js"></script>

  <style>
    body { background:#0b1220; color:#e8ecf1; font-family:system-ui,sans-serif; margin:0; overflow-x:hidden; }
    .wrap { max-width:1000px; margin:40px auto; padding:0 16px; position:relative; }
    h1 { margin-bottom:10px; }
    select {
      background:#121a2b; color:#e8ecf1; border:1px solid rgba(255,255,255,0.1);
      border-radius:8px; padding:8px 10px; margin-bottom:12px; font-size:15px; min-width:200px;
    }
    select[multiple] { min-width:260px; min-height:112px; }
    .chart-container, #calendar {
      background:#121a2b; border-radius:12px; padding:20px; box-shadow:0 0 20px rgba(0,0,0,0.25); min-height:420px;
    }
    canvas { width:100% !important; height:420px !important; }
    .btn {
      display:inline-block; text-decoration:none; color:#e8ecf1; border:1px solid rgba(255,255,255,0.1);
      padding:8px 12px; border-radius:8px; background:rgba(255,255,255,0.04); transition:0.2s border-color,0.2s transform; cursor:pointer;
    }
    .btn:hover { border-color:#4cc2ff; transform:translateY(-2px); }
    .btn-row { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:15px; align-items:center; justify-content:space-between; }
    .lang-switch a {
      text-decoration:none; color:#e8ecf1; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.04);
      padding:6px 10px; border-radius:8px; font-size:14px; transition:0.2s all;
    }
    .lang-switch a:hover { border-color:#4cc2ff; color:#4cc2ff; }
    .controls { display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
    .summary {
      margin-top:16px; background:rgba(255,255,255,0.05); padding:12px 14px; border-radius:10px; border:1px solid rgba(255,255,255,0.1);
      font-size:15px; line-height:1.6;
    }
    .hint { font-size:13px; color:#9fb0c7; margin:8px 0 12px; }
    .pill { border:1px solid rgba(255,255,255,0.15); border-radius:999px; padding:4px 8px; font-size:12px; color:#9fb0c7; }
    .notice { margin-top:12px; font-size:14px; color:#9fb0c7; white-space:pre-wrap; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="btn-row">
      <h1>📊 {{ t("history_title") }}</h1>
      <div class="lang-switch">
        <a href="{{ url_for('set_lang', code=lang_toggle) }}">{{ t("lang_toggle_label") }}</a>
      </div>
    </div>

    <p>{{ t("history_subtitle") }}</p>

    <div class="btn-row">
      <div class="controls">
        <button id="toggleView" class="btn">📅 Ver calendario</button>
        <a href="{{ url_for('actualizar_precios') }}" class="btn">🔍 {{ t("update_prices") }}</a>
        <a href="{{ url_for('home') }}" class="btn">⬅ {{ t("back_panel") }}</a>
      </div>
      <div class="controls">
        <button class="btn" id="btnInject">➕ Inyectar precio</button>
        <button class="btn" id="btnDelete">🗑️ Eliminar precio</button>
        <button class="btn" id="btnResetZoom">🔄 Reset zoom</button>
      </div>
    </div>

    <!-- === Sección GRÁFICO === -->
    <div id="chartSection">
      <div class="controls">
        <select id="originSelect">
          <option value="">{{ t("select_origin") }}</option>
        </select>

        <select id="destSelect" disabled>
          <option value="">{{ t("select_destination") }}</option>
        </select>

        <select id="dateSelect" multiple disabled title="Pulsa Ctrl/Cmd para seleccionar varias"></select>

        <select id="pointSelect" disabled title="Registros de la fecha seleccionada">
          <option value="">— Punto (fecha de consulta) —</option>
        </select>
      </div>

      <div class="hint">
        🔎 Puedes <strong>hacer zoom</strong> con la rueda del ratón / gesto de pinza. Mantén pulsado y arrastra para zoom por área.
        <span class="pill">Doble clic = Reset parcial</span>
      </div>

      <div class="chart-container">
        <canvas id="priceChart"></canvas>
      </div>

      <div id="summary" class="summary" style="display:none;"></div>
    </div>

    <!-- === Sección CALENDARIO === -->
    <div id="calendarSection" style="display:none;">
      <div id="calendar"></div>
      <div id="calNotice" class="notice" style="display:none;"></div>
    </div>
  </div>

  <script>
  document.addEventListener('DOMContentLoaded', () => {
    try { if (window['chartjs-plugin-zoom']) Chart.register(window['chartjs-plugin-zoom']); else if (window.ChartZoom) Chart.register(window.ChartZoom); } catch(e) {}

    const historico = {{ historico | tojson }};
    const ctx        = document.getElementById('priceChart').getContext('2d');
    const originSel  = document.getElementById('originSelect');
    const destSel    = document.getElementById('destSelect');
    const dateSel    = document.getElementById('dateSelect');
    const pointSel   = document.getElementById('pointSelect');
    const summaryBox = document.getElementById('summary');

    let chart = null;

    const uniq   = arr => [...new Set(arr)];
    const fmtTS  = s => (s || '').replace('T',' ');
    const toMs   = s => new Date(s).getTime();
    const pad    = n => String(n).padStart(2,'0');
    const fmtTick= ms => { const d=new Date(Number(ms)); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`; };
    const randRGBA=(a=0.6)=>{const H=[196,152,100,280,20,330,45,160,210,260];const h=H[Math.floor(Math.random()*H.length)];return{border:`hsl(${h} 90% 60%)`,fill:`hsla(${h} 90% 60% / ${a})`};};

    function buildOriginOptions(){
      const origins = uniq(historico.map(h=>h.origin).filter(Boolean)).sort();
      originSel.innerHTML = `<option value="">{{ t("select_origin") }}</option>`;
      origins.forEach(o=>{ const opt=document.createElement('option'); opt.value=o; opt.textContent=o; originSel.appendChild(opt); });
      originSel.disabled=false;
    }
    function buildDestOptions(origin){
      destSel.innerHTML = `<option value="">{{ t("select_destination") }}</option>`;
      pointSel.innerHTML = `<option value="">— Punto (fecha de consulta) —</option>`;
      pointSel.disabled = true; dateSel.innerHTML=''; dateSel.disabled=true;
      if(!origin){ destSel.disabled=true; return; }
      const dests = uniq(historico.filter(h=>h.origin===origin).map(h=>h.destination)).sort();
      destSel.disabled=false; dests.forEach(d=>{ const opt=document.createElement('option'); opt.value=d; opt.textContent=d; destSel.appendChild(opt); });
    }
    function buildDateOptions(origin,dest){
      dateSel.innerHTML=''; pointSel.innerHTML=`<option value="">— Punto (fecha de consulta) —</option>`; pointSel.disabled=true;
      if(!(origin&&dest)){ dateSel.disabled=true; return; }
      const dates = uniq(historico.filter(h=>h.origin===origin && h.destination===dest).map(h=>h.date)).sort();
      dates.forEach(d=>{ const opt=document.createElement('option'); opt.value=d; opt.textContent=d; dateSel.appendChild(opt); });
      dateSel.disabled=false;
    }
    function populatePointSelect(items){
      pointSel.innerHTML='<option value="">— Punto (fecha de consulta) —</option>';
      if(!items.length){ pointSel.disabled=true; return; }
      const sorted = items.slice().sort((a,b)=> new Date(a.checked_at) - new Date(b.checked_at));
      sorted.forEach(e=>{ const opt=document.createElement('option'); opt.value=e.checked_at; opt.textContent=`${fmtTS(e.checked_at)} — ${e.price}€`; pointSel.appendChild(opt); });
      pointSel.disabled=false;
    }

    function renderChartFor(origin,dest,dates){
      if(chart) chart.destroy();
      if(!(origin&&dest&&dates&&dates.length)){ summaryBox.style.display='none'; return; }

      const datasets=[]; const showSummary=(dates.length===1); let singleStats=null;
      dates.forEach(d=>{
        const rows=historico.filter(h=>h.origin===origin && h.destination===dest && h.date===d);
        const sorted=rows.slice().sort((a,b)=> new Date(a.checked_at)-new Date(b.checked_at));
        const points=sorted.map(e=>({x:toMs(e.checked_at), y:Number(e.price)}));
        const onlyPrices=sorted.map(e=>Number(e.price)); const color=randRGBA();
        datasets.push({ label:`${origin} → ${dest} (${d})`, data:points, borderColor:color.border, backgroundColor:color.fill, borderWidth:2, fill:true, pointRadius:4, pointHoverRadius:6, tension:0.2 });
        if(showSummary){ const min=Math.min(...onlyPrices); const max=Math.max(...onlyPrices); const avg=(onlyPrices.reduce((a,b)=>a+b,0)/Math.max(onlyPrices.length,1)).toFixed(2); singleStats={min,max,avg}; populatePointSelect(sorted); }
      });

      chart=new Chart(ctx,{ type:'line',
        data:{ datasets },
        options:{
          parsing:{ xAxisKey:'x', yAxisKey:'y' }, responsive:true, maintainAspectRatio:false, animation:{duration:350}, interaction:{mode:'nearest', intersect:false},
          scales:{ x:{ type:'linear', ticks:{ color:'#9fb0c7', callback:(v)=>fmtTick(v) }, grid:{ color:'rgba(255,255,255,0.03)' } }, y:{ ticks:{ color:'#e8ecf1' }, grid:{ color:'rgba(255,255,255,0.06)' } } },
          plugins:{ legend:{ labels:{ color:'#e8ecf1' } }, tooltip:{ backgroundColor:'#121a2b', borderColor:'#4cc2ff', borderWidth:1, titleColor:'#fff', bodyColor:'#ddd', callbacks:{ title:i=>i?.[0]?.raw?fmtTick(i[0].raw.x):'', label:i=>`€ ${i.raw?.y}` } }, zoom:{ limits:{ y:{min:'original',max:'original'} }, pan:{enabled:true,mode:'xy'}, zoom:{wheel:{enabled:true}, pinch:{enabled:true}, mode:'xy', drag:{enabled:true}} } }
        }
      });

      if(showSummary&&singleStats){ summaryBox.innerHTML=`<p>💶 Precio medio: <strong>${singleStats.avg} €</strong></p><p>📉 Mínimo: ${singleStats.min} € — 📈 Máximo: ${singleStats.max} €</p>`; summaryBox.style.display='block'; }
      else { summaryBox.style.display='none'; pointSel.innerHTML='<option value="">— Punto (fecha de consulta) —</option>'; pointSel.disabled=true; }
    }

    originSel.addEventListener('change',()=>{ buildDestOptions(originSel.value); renderChartFor(null,null,[]); });
    destSel.addEventListener('change',()=>{ buildDateOptions(originSel.value, destSel.value); renderChartFor(null,null,[]); });
    dateSel.addEventListener('change',()=>{
      const origin=originSel.value, dest=destSel.value, dates=Array.from(dateSel.selectedOptions).map(o=>o.value);
      if(dates.length===1){ const rows=historico.filter(h=>h.origin===origin && h.destination===dest && h.date===dates[0]); populatePointSelect(rows); }
      else { pointSel.innerHTML='<option value="">— Punto (fecha de consulta) —</option>'; pointSel.disabled=true; }
      renderChartFor(origin,dest,dates);
    });

    document.getElementById('btnInject').addEventListener('click', async ()=>{
      const origin=originSel.value, dest=destSel.value, dates=Array.from(dateSel.selectedOptions).map(o=>o.value);
      if(!(origin&&dest) || dates.length!==1) return alert("Selecciona exactamente 1 fecha del trayecto para inyectar un precio.");
      const date=dates[0]; const precio=prompt("Introduce el precio manual (ej. 39.99):"); if(!precio) return;
      const res=await fetch("/api/inject_price",{ method:"POST", headers:{ "Content-Type":"application/json" }, body:JSON.stringify({origin, destination:dest, date, price:parseFloat(precio)})});
      const data=await res.json(); alert(data.message||"Hecho"); location.reload();
    });

    document.getElementById('btnDelete').addEventListener('click', async ()=>{
      const origin=originSel.value, dest=destSel.value, dates=Array.from(dateSel.selectedOptions).map(o=>o.value), checkedAt=pointSel.value;
      if(!(origin&&dest) || dates.length!==1) return alert("Selecciona exactamente 1 fecha del trayecto.");
      if(!checkedAt) return alert("Selecciona un punto concreto (fecha de consulta).");
      if(!confirm(`Eliminar el registro de ${checkedAt}?`)) return;
      const res=await fetch("/api/delete_price",{ method:"POST", headers:{ "Content-Type":"application/json" }, body:JSON.stringify({origin, destination:dest, date:dates[0], checked_at:checkedAt})});
      const data=await res.json(); alert(data.message||"Hecho"); location.reload();
    });

    document.getElementById('btnResetZoom').addEventListener('click',()=>{ if(chart) chart.resetZoom(); });

    // === Calendario robusto ===
    let calendarInstance=null, calendarRendered=false;
    async function renderCalendar(){
      if(calendarRendered && calendarInstance) return;

      const calEl   = document.getElementById('calendar');
      const notice  = document.getElementById('calNotice');
      calEl.innerHTML = '';                       // limpia residuos
      notice.style.display='none'; notice.textContent='';

      try {
        const res = await fetch("/api/calendar");
        const raw = await res.text();            // lee como texto primero
        if(!res.ok){
          throw new Error(`HTTP ${res.status} ${res.statusText}\n${raw.slice(0,300)}`);
        }
        let events;
        try { events = JSON.parse(raw); }
        catch(parseErr){ throw new Error('JSON inválido en /api/calendar:\n' + raw.slice(0,300)); }

        if(!Array.isArray(events)) events = [];
        if(events.length === 0){
          notice.textContent = 'No hay vuelos guardados para mostrar en el calendario.';
          notice.style.display = 'block';
        }

        calendarInstance = new FullCalendar.Calendar(calEl, {
          initialView: 'dayGridMonth',
          height: 620,
          headerToolbar: { left:'prev,next today', center:'title', right:'' },
          events: events.map(e => ({ title: e.title, start: e.start, color: '#4cc2ff' })),
          eventClick: info => {
            alert(`✈️ ${info.event.title}\n📅 ${info.event.start.toISOString().slice(0,10)}`);
          }
        });
        calendarInstance.render();
        calendarRendered = true;
      } catch(err){
        console.error(err);
        notice.textContent = 'No se pudo cargar el calendario.\n' + (err?.message || String(err));
        notice.style.display = 'block';
      }
    }

    // Toggle vista
    const btnToggle = document.getElementById('toggleView');
    btnToggle.addEventListener('click', () => {
      const chartSec = document.getElementById('chartSection');
      const calSec   = document.getElementById('calendarSection');
      const isChartVisible = chartSec.style.display !== 'none';
      if (isChartVisible) {
        chartSec.style.display = 'none';
        calSec.style.display = 'block';
        btnToggle.textContent = "📈 Ver gráfico";
        setTimeout(renderCalendar, 0);
      } else {
        chartSec.style.display = 'block';
        calSec.style.display = 'none';
        btnToggle.textContent = "📅 Ver calendario";
      }
    });

    buildOriginOptions();
  });
  </script>
</body>
</html>
