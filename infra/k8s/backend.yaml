apiVersion: apps/v1
kind: Deployment
metadata:
  name: viru-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: viru-backend
  template:
    metadata:
      labels:
        app: viru-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/your-org/viru-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: APP_ENV
              value: "staging"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: viru-backend
spec:
  selector:
    app: viru-backend
  ports:
    - port: 8000
      targetPort: 8000
