apiVersion: apps/v1
kind: Deployment
metadata:
  name: viru-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: viru-frontend
  template:
    metadata:
      labels:
        app: viru-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/your-org/viru-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.viru.local/api/v1"
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: viru-frontend
spec:
  selector:
    app: viru-frontend
  ports:
    - port: 3000
      targetPort: 3000
