version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js 15
  - React 19
  - CSS (globals.css)
  - Font Awesome 6.5.2
  - Google Analytics
routes:
  - path: /
    file: src/app/page.tsx
    auth_required: false
    description: Landing page
  - path: /login
    file: src/app/(public)/login
    auth_required: false
    description: User login page
  - path: /register
    file: src/app/(public)/register
    auth_required: false
    description: User registration page
  - path: /policies
    file: src/app/(public)/policies
    auth_required: false
    description: Policies page
  - path: /dashboard
    file: src/app/(private)/dashboard
    auth_required: true
    description: Main dashboard with KPIs and module access
  - path: /watchlist
    file: src/app/(private)/watchlist
    auth_required: true
    description: Watchlist management for tracked flights
  - path: /quick-search
    file: src/app/(private)/quick-search
    auth_required: true
    description: Flight search with advanced filters
  - path: /history
    file: src/app/(private)/history
    auth_required: true
    description: Price history viewer
  - path: /alerts
    file: src/app/(private)/alerts
    auth_required: true
    description: Alert rules management
  - path: /preferences
    file: src/app/(private)/preferences
    auth_required: true
    description: User preferences and settings
  - path: /suggestions
    file: src/app/(private)/suggestions
    auth_required: true
    description: Send feedback/suggestions
  - path: /admin
    file: src/app/(private)/admin
    auth_required: true
    description: Admin panel for user and watchlist management
features:
  - name: User Registration
    description: Register new account with email and password
    files:
      - src/app/(public)/register
      - src/modules/shared
    entry_route: /register
    user_interactions:
      - Fill email input field
      - Fill password input field
      - Click Register button
      - See validation messages for mismatched passwords or invalid email
      - See success message and redirect to login
    api_calls:
      - method: POST
        endpoint: /api/v1/auth/register
    auth_required: false

  - name: User Login
    description: Login with email and password
    files:
      - src/app/(public)/login
      - src/modules/shared
    entry_route: /login
    user_interactions:
      - Fill email input field
      - Fill password input field
      - Click Login button
      - See error message on invalid credentials
      - See success and redirect to dashboard
    api_calls:
      - method: POST
        endpoint: /api/v1/auth/login
    auth_required: false

  - name: Session Management
    description: Maintain JWT bearer session and logout
    files:
      - src/modules/shared
    entry_route: /dashboard
    user_interactions:
      - View user account status from menu
      - Click logout to end session
      - See redirect to landing page after logout
    api_calls:
      - method: GET
        endpoint: /api/v1/auth/me
    auth_required: true

  - name: Theme Switcher
    description: Switch between light and dark theme globally
    files:
      - src/app/layout.tsx
      - src/modules/shared
    entry_route: /dashboard
    user_interactions:
      - Click theme toggle button
      - See theme switch in UI
      - Theme persists across sessions
    api_calls: []
    auth_required: false

  - name: Dashboard
    description: Main user dashboard with KPIs and module navigation
    files:
      - src/app/(private)/dashboard
      - src/modules/shared
    entry_route: /dashboard
    user_interactions:
      - View KPI cards (active users, active flights, recent activity)
      - Access Watchlist module link
      - Access Quick Search module link
      - Access Suggestions module link
      - Access Alerts module link
      - Access History module link
      - View recent activity
      - Create notes via form
      - Edit existing notes
      - Delete notes
    api_calls:
      - method: GET
        endpoint: /api/v1/auth/me
      - method: GET
        endpoint: /api/v1/notes
      - method: POST
        endpoint: /api/v1/notes
      - method: PUT
        endpoint: /api/v1/notes/{note_id}
      - method: DELETE
        endpoint: /api/v1/notes/{note_id}
    auth_required: true

  - name: Watchlist
    description: Create, view, and manage watched flights
    files:
      - src/app/(private)/watchlist
      - src/modules/watchlist
    entry_route: /watchlist
    user_interactions:
      - Create new flight watch with origin, destination, date
      - View list of watched flights with status and price
      - Click refresh button to manually refresh flight data
      - See updated price and status immediately
      - Access price history from watchlist item
      - See visual comparison charts
    api_calls:
      - method: POST
        endpoint: /api/v1/watchlist
      - method: GET
        endpoint: /api/v1/watchlist
      - method: POST
        endpoint: /api/v1/watchlist/{watch_id}/refresh-now
    auth_required: true

  - name: Quick Search
    description: Search flights with multiple filters and view results
    files:
      - src/app/(private)/quick-search
      - src/modules/search
    entry_route: /quick-search
    user_interactions:
      - Select origin airport with search and recent options
      - Select destination airport with search and recent options
      - Pick departure date
      - Pick return date for round trip
      - Adjust number of adults with stepper
      - Apply advanced filters
      - See radio of search input
      - Include/exclude nearby origins and destinations
      - Filter by time windows
      - Toggle include/exclude stops
      - Set maximum number of stops
      - Exclude specific airport codes
      - Toggle strict/relaxed mode
      - Set date flexibility (days_before, days_after)
      - View results with price, duration, stops, risk_label, freshness
      - See stale_data indicator if applicable
      - See ranking_score for results
      - Click result to open Ryanair deeplink
      - Save result to watchlist
      - Copy parameters when deeplink unavailable
      - View weather for origin/destination
      - See search status (idle, loading, success, empty, error, rate limit)
    api_calls:
      - method: POST
        endpoint: /api/v1/search/quick
      - method: GET
        endpoint: /api/v1/search/deeplink
      - method: GET
        endpoint: /api/v1/airports/compatible
      - method: GET
        endpoint: /api/v1/airports/nearby
    auth_required: true

  - name: Price History
    description: View and analyze price history for watched flights
    files:
      - src/app/(private)/history
      - src/modules/history
    entry_route: /history
    user_interactions:
      - Select a watched flight to view history
      - See list of price snapshots with timestamps
      - See departure time when available
      - Apply filters on history view
      - Toggle between linear and calendar views
      - See price trends and comparison data
    api_calls:
      - method: GET
        endpoint: /api/v1/prices/history
    auth_required: true

  - name: Alerts
    description: Create and manage price alert rules
    files:
      - src/app/(private)/alerts
      - src/modules/alerts
    entry_route: /alerts
    user_interactions:
      - Create alert rule with threshold_low type
      - Create alert rule with threshold_high type
      - Create alert rule with every_change type
      - Set cooldown_minutes for alerts
      - Toggle notify_on_every_change option
      - View list of alert rules for a flight
      - Pause an active alert rule
      - Activate a paused alert rule
      - Delete an alert rule
      - Simulate/evaluate alerts immediately
      - View alert event history
      - See timestamps and details of triggered alerts
    api_calls:
      - method: POST
        endpoint: /api/v1/alerts/rules
      - method: GET
        endpoint: /api/v1/alerts/rules
      - method: PUT
        endpoint: /api/v1/alerts/rules/{rule_id}
      - method: DELETE
        endpoint: /api/v1/alerts/rules/{rule_id}
      - method: POST
        endpoint: /api/v1/alerts/evaluate
      - method: GET
        endpoint: /api/v1/alerts/events
    auth_required: true

  - name: Preferences
    description: Manage user preferences and settings
    files:
      - src/app/(private)/preferences
      - src/modules/preferences
    entry_route: /preferences
    user_interactions:
      - View current user preferences
      - Update radio default (search radius)
      - Update escalas default (max stops)
      - Update horario default (time window)
      - Update idioma default (language)
      - Update moneda default (currency)
      - Save preferences
      - See saved settings persist in Quick Search module
    api_calls:
      - method: GET
        endpoint: /api/v1/preferences
      - method: PUT
        endpoint: /api/v1/preferences
    auth_required: true

  - name: Suggestions
    description: Send user feedback and suggestions
    files:
      - src/app/(private)/suggestions
      - src/modules/suggestions
    entry_route: /suggestions
    user_interactions:
      - Fill suggestion text field (EN or ES)
      - Validate minimum length requirement
      - Submit suggestion
      - See submission status (pending, success, error)
      - See confirmation message after successful submission
    api_calls:
      - method: POST
        endpoint: /api/v1/suggestions
    auth_required: true

  - name: Admin Panel
    description: Admin user and watchlist management
    files:
      - src/app/(private)/admin
    entry_route: /admin
    user_interactions:
      - View list of all users
      - Search users by email or name
      - Change password for specific user
      - Delete user account
      - View watchlist items for specific user
      - Create watchlist item for user
      - Delete watchlist item
      - See admin-only view without user seeing it
    api_calls:
      - method: GET
        endpoint: /api/v1/admin/users
      - method: PUT
        endpoint: /api/v1/admin/users/{user_id}/password
      - method: DELETE
        endpoint: /api/v1/admin/users/{user_id}
      - method: GET
        endpoint: /api/v1/admin/users/{user_id}/watchlist
      - method: POST
        endpoint: /api/v1/admin/users/{user_id}/watchlist
      - method: DELETE
        endpoint: /api/v1/admin/watchlist/{watch_id}
    auth_required: true

  - name: Route Protection
    description: Protect private routes and redirect unauthorized access
    files:
      - src/app/(private)/layout.tsx
    entry_route: /dashboard
    user_interactions:
      - Try to access private route without authentication
      - See redirect to login page
      - Login and access private route properly
      - See proper dashboard after login
    api_calls:
      - method: GET
        endpoint: /api/v1/auth/me
    auth_required: true

  - name: Policies
    description: View application policies
    files:
      - src/app/(public)/policies
    entry_route: /policies
    user_interactions:
      - View policies page
      - Read terms and conditions
      - Navigate back to landing or login
    api_calls: []
    auth_required: false
      - Fill password input field
      - Click login/register button
      - See error messages on invalid credentials
      - redirect to dashboard on success
    api_calls:
      - method: POST
        endpoint: /api/auth/login
      - method: POST
        endpoint: /api/auth/register
    auth_required: false
  - name: Alert Management
    description: Create and manage security alerts
    files:
      - src/modules/alerts
      - src/app/(private)/alerts
    entry_route: /alerts
    user_interactions:
      - View list of alerts
      - Create new alert
      - Edit existing alert
      - Delete alert
      - Filter alerts by category
    api_calls:
      - method: GET
        endpoint: /api/alerts
      - method: POST
        endpoint: /api/alerts
      - method: PUT
        endpoint: /api/alerts/{id}
      - method: DELETE
        endpoint: /api/alerts/{id}
    auth_required: true
  - name: Watchlist Management
    description: Add and manage watched items
    files:
      - src/modules/watchlist
      - src/app/(private)/watchlist
    entry_route: /watchlist
    user_interactions:
      - View watchlist items
      - Add item to watchlist
      - Remove item from watchlist
      - View details of watchlisted item
    api_calls:
      - method: GET
        endpoint: /api/watchlist
      - method: POST
        endpoint: /api/watchlist
      - method: DELETE
        endpoint: /api/watchlist/{id}
    auth_required: true
  - name: Search History
    description: View and manage past searches
    files:
      - src/modules/history
      - src/app/(private)/history
    entry_route: /history
    user_interactions:
      - View search history list
      - Click on history item to repeat search
      - Delete history item
      - Clear all history
    api_calls:
      - method: GET
        endpoint: /api/history
      - method: DELETE
        endpoint: /api/history/{id}
    auth_required: true
  - name: User Preferences
    description: Manage user settings and preferences
    files:
      - src/modules/preferences
      - src/app/(private)/preferences
    entry_route: /preferences
    user_interactions:
      - Update display preferences
      - Change notification settings
      - Update API provider preferences
      - Save changes
    api_calls:
      - method: GET
        endpoint: /api/preferences
      - method: PUT
        endpoint: /api/preferences
    auth_required: true
  - name: Search and Suggestions
    description: Search functionality with suggestions
    files:
      - src/modules/search
      - src/modules/suggestions
      - src/app/(private)/quick-search
    entry_route: /dashboard
    user_interactions:
      - Type in search field
      - See search suggestions dropdown
      - Click suggestion to select
      - Submit search query
      - View search results
    api_calls:
      - method: GET
        endpoint: /api/search
      - method: GET
        endpoint: /api/suggestions
    auth_required: true
known_limitations:
  - issue: Frontend not connected to backend API
    location: src/modules/
    impact: All API calls may be mocked or not functional until backend is running
  - issue: Authentication state not persisted
    location: src/modules/shared
    impact: Users may lose session on page refresh if localStorage not implemented
